<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — GLPS Mulkadu</title>
  <meta name="description" content="Admin panel login for GLPS Mulkadu school website">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔐</text></svg>">
  <link rel="stylesheet" href="css/admin.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Login Container -->
  <div class="login-container">
    <div class="login-box">
      <!-- Header -->
      <div class="login-header">
        <div class="login-logo">🔐</div>
        <h1>Admin Login</h1>
        <p>Enter your credentials to access the admin panel</p>
      </div>

      <!-- Alert Messages -->
      <div id="alert" class="alert"></div>

      <!-- Login Form -->
      <form id="login-form" novalidate>
        <!-- Email Field -->
        <div class="form-group">
          <label for="email">Admin Email</label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            placeholder="admin@example.com"
            required 
            autocomplete="email"
          >
        </div>

        <!-- Password Field -->
        <div class="form-group">
          <label for="password">Password</label>
          <input 
            type="password" 
            id="password" 
            name="password" 
            placeholder="••••••••"
            required 
            autocomplete="current-password"
          >
        </div>

        <!-- Submit Button -->
        <button type="submit" id="login-btn" class="form-button">
          <span class="loader"></span>
          Sign In
        </button>
      </form>

      <!-- Footer Info -->
      <p class="text-center text-muted mt-20">
        Protected by Firebase Authentication
      </p>
    </div>
  </div>

  <!-- Firebase Configuration -->
<script type="module" src="./js/auth.js"></script>
</body>
</html>
